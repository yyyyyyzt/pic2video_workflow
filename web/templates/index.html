<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoleSwap 测试台</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <header>
      <h1>RoleSwap 数字人测试台</h1>
      <p>任务在<strong>服务器后台</strong>执行，关闭页面或断网不影响生成。可随时回来查看进度。</p>
    </header>

    <section class="card">
      <div class="section-header">
        <h2>任务列表</h2>
        <button type="button" id="refresh-jobs-btn" class="btn-secondary">刷新</button>
      </div>
      <div id="jobs-list" class="jobs-list">
        <p class="muted">加载中…</p>
      </div>
    </section>

    <form id="job-form" class="card">
      <h2 class="section-title">新建任务</h2>
      <div class="grid-2">
        <label class="field">
          <span>表演视频 *（节点 46:video）</span>
          <input type="file" name="video" accept="video/*" required />
        </label>
        <label class="field">
          <span>目标人脸图片 *（节点 47:image）</span>
          <input type="file" name="face" accept="image/*" required />
        </label>
      </div>

      <div class="grid-3">
        <label class="field">
          <span>工作流模式（节点 151:value）</span>
          <select name="mode">
            <option value="role_swap" selected>角色替换（False）</option>
            <option value="motion_transfer">动作迁移（True）</option>
          </select>
        </label>
        <label class="field">
          <span>目标时长 duration（秒）</span>
          <input type="number" name="duration" value="60" min="1" max="600" />
        </label>
        <label class="field">
          <span>采样步数 steps（42:steps）</span>
          <input type="number" name="steps" value="6" min="1" max="30" />
        </label>
        <label class="field">
          <span>引导强度 cfg（42:cfg）</span>
          <input type="number" name="cfg" value="1.0" min="0.1" max="5" step="0.1" />
        </label>
        <label class="field">
          <span>时序偏移 shift（42:shift）</span>
          <input type="number" name="shift" value="5.0" min="0" max="20" step="0.1" />
        </label>
        <label class="field">
          <span>随机种子 seed（42:seed，留空随机）</span>
          <input type="number" name="seed" placeholder="可选" />
        </label>
        <label class="field">
          <span>并行数 max_parallel</span>
          <input type="number" name="max_parallel" value="2" min="1" max="8" />
        </label>
      </div>

      <details class="advanced" open>
        <summary>高级工作流参数（ComfyUI input_values）</summary>
        <div class="grid-3">
          <label class="field">
            <span>单段帧数上限（125:value，≤{{ frame_load_cap }}）</span>
            <input type="number" name="frame_load_cap" value="{{ frame_load_cap }}" min="1" max="{{ frame_load_cap }}" />
          </label>
          <label class="field">
            <span>输出宽度（123:value）</span>
            <input type="number" name="output_width" value="896" min="0" max="4096" step="32" />
          </label>
          <label class="field">
            <span>帧率 fps（124:value / 99:frame_rate）</span>
            <input type="number" name="fps" value="24" min="1" max="60" />
          </label>
          <label class="field">
            <span>姿态强度（159:pose_strength）</span>
            <input type="number" name="pose_strength" value="1.0" min="0" max="2" step="0.05" />
          </label>
          <label class="field">
            <span>参考强度（159:ref_strength）</span>
            <input type="number" name="ref_strength" value="1.0" min="0" max="2" step="0.05" />
          </label>
          <label class="field">
            <span>上下文重叠（43:context_overlap）</span>
            <input type="number" name="context_overlap" value="16" min="0" max="32" />
          </label>
        </div>
        <label class="field">
          <span>正向提示词（56:positive_prompt）</span>
          <textarea name="positive_prompt" rows="2" placeholder="可选"></textarea>
        </label>
        <label class="field">
          <span>负向提示词（56:negative_prompt）</span>
          <textarea name="negative_prompt" rows="3">色调艳丽，过曝，静态，细节模糊不清，字幕，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余…</textarea>
        </label>
      </details>

      <button type="submit" id="submit-btn">提交后台任务</button>
    </form>

    <section id="status-card" class="card hidden">
      <h2>当前任务详情</h2>
      <p><strong>任务 ID：</strong><span id="job-id">-</span></p>
      <p><strong>状态：</strong><span id="job-status" class="badge">-</span></p>
      <p id="job-message">-</p>
      <div class="progress-wrap hidden" id="progress-wrap">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <p class="muted" id="progress-text">0 / 0 段</p>
      </div>
      <pre id="job-log" class="log hidden"></pre>
      <pre id="job-error" class="error hidden"></pre>
      <div class="actions">
        <a id="download-link" class="btn hidden" href="#" download>下载结果视频</a>
        <button type="button" id="resume-btn" class="btn-secondary hidden">继续任务（断点续传）</button>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
